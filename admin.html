<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Face Recognition System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="admin-body">
    <a href="index.html" id="kiosk-link" class="secondary-btn" style="position: absolute; top: 20px; right: 20px; text-decoration: none;">Go to Kiosk</a>

    <!-- Login View -->
    <div id="login-view" class="glass-panel">
        <h2 style="display:flex; align-items:center; justify-content:center; gap:10px;"><i data-lucide="lock"></i> Site Manager Login</h2>
        <div id="ip-error" class="error-text hidden" style="margin-bottom: 1rem;"></div>
        <form id="login-form">
            <div class="input-group">
                <label>Admin Password:</label>
                <input type="password" id="login-password" required>
            </div>
            <input type="hidden" id="login-site-ip" value="127.0.0.1">
            <button type="submit" class="primary-btn">Log In</button>
            <p id="login-error" class="error-text hidden"></p>
        </form>
    </div>

    <!-- Change Password Modal -->
    <div id="password-modal" class="glass-panel hidden" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; padding: 2rem;">
        <h3>Change Admin Password</h3>
        <form id="password-form">
            <div class="input-group">
                <label>Current Password:</label>
                <input type="password" id="old-password" required>
            </div>
            <div class="input-group">
                <label>New Password:</label>
                <input type="password" id="new-password" required>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="primary-btn">Update</button>
                <button type="button" id="close-password-btn" class="secondary-btn">Cancel</button>
            </div>
            <p id="password-status" class="status-text"></p>
        </form>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="dashboard-container hidden">
        <header class="glass-panel header">
            <h2><i data-lucide="shield-check"></i> Biometric Admin Dashboard</h2>
            <div style="display: flex; gap: 10px;">
                <button id="open-password-btn" class="secondary-btn">Change Password</button>
                <button id="logout-btn" class="secondary-btn">Log Out</button>
            </div>
        </header>

        <div class="dashboard-content glass-panel">
            <nav class="tabs">
                <button class="tab-btn active" data-tab="logs"><i data-lucide="bar-chart-2"></i> Attendance Logs</button>
                <button class="tab-btn" data-tab="add"><i data-lucide="user-plus"></i> Add Employee</button>
                <button class="tab-btn" data-tab="update"><i data-lucide="refresh-cw"></i> Update Employee</button>
                <button class="tab-btn" data-tab="remove"><i data-lucide="user-x"></i> Remove Employee</button>
            </nav>

            <div class="tab-content active" id="tab-logs">
                <h3>Daily Attendance Records</h3>
                <div class="filters">
                    <label>Filter by Name: <input type="text" id="filter-name" placeholder="Employee Name..."></label>
                    <button id="fetch-logs-btn" class="secondary-btn">Refresh Logs</button>
                </div>
                <div class="table-container">
                    <table id="logs-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Name</th>
                                <th>Check-In Time</th>
                                <th>Check-Out Time</th>
                                <th>Site IP</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="tab-content" id="tab-add">
                <h3>Register New Employee</h3>
                <form id="add-employee-form">
                    <div class="input-group">
                        <label>Employee Full Name:</label>
                        <input type="text" id="add-name" required>
                    </div>
                    
                    <div style="display: flex; gap: 20px; margin-bottom: 1rem;">
                        <div style="flex: 1;">
                            <label>Capture from Webcam:</label>
                            <div style="margin-top: 10px;">
                                <button type="button" id="start-camera-btn" class="secondary-btn">Start Camera</button>
                            </div>
                            <div id="camera-container" class="hidden" style="margin-top: 10px; position: relative; width: 100%; max-width: 320px; aspect-ratio: 4/3; background: black; border-radius: 8px; overflow: hidden;">
                                <video id="add-webcam" autoplay playsinline style="width: 100%; height: 100%;"></video>
                                <button type="button" id="capture-btn" class="primary-btn" style="position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);">Capture</button>
                            </div>
                        </div>
                        <div style="flex: 1;">
                            <label>Upload Files:</label>
                            <input type="file" id="add-images" multiple accept="image/*" style="margin-top: 10px;">
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>Staged Photos (<span id="staged-count">0</span>/5):</label>
                        <div id="staged-photos" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; min-height: 80px; padding: 10px; border: 1px dashed var(--panel-border); border-radius: 8px;"></div>
                    </div>

                    <button type="submit" class="primary-btn" id="submit-add-btn" disabled>Register Employee</button>
                    <p id="add-status" class="status-text"></p>
                </form>
            </div>

            <div class="tab-content" id="tab-update">
                <h3>Enhance Employee Profile</h3>
                <form id="update-employee-form">
                    <div class="input-group">
                        <label>Select Employee:</label>
                        <select id="update-name" required></select>
                    </div>
                    <div class="input-group">
                        <label>Upload New Photos:</label>
                        <input type="file" id="update-images" multiple accept="image/*" required>
                    </div>
                    <button type="submit" class="primary-btn">Update Profile</button>
                    <p id="update-status" class="status-text"></p>
                </form>
            </div>

            <div class="tab-content" id="tab-remove">
                <h3>Remove Employee</h3>
                <div class="input-group">
                    <label>Select Employee to Remove:</label>
                    <select id="remove-name" required></select>
                </div>
                <button id="remove-btn" class="danger-btn">Delete User</button>
                <p id="remove-status" class="status-text"></p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script type="module" src="admin.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
